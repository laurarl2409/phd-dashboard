# =====================================================================
# Scholar Command — Decap CMS configuration (live-data edition)
# Built on the decap_base.txt scaffolding. Every dashboard module maps
# to a JSON data file under /content/data/, which the frontend
# (index.html at the site root, per system_routing.txt) fetches on
# every load — so a change saved here appears on the dashboard as soon
# as Netlify finishes its rebuild. Media and PDF uploads (course files,
# full-text papers, graphics, guidelines packets, voice memos) save to
# /assets/ automatically.
# =====================================================================

backend:
  name: git-gateway
  branch: main

# Allows running "npx decap-server" locally for offline editing.
local_backend: true

media_folder: "assets"
public_folder: "/assets"

collections:
  # ===================================================================
  # ALL DASHBOARD MODULES — one entry per widget on the dashboard
  # ===================================================================
  - name: "dashboard"
    label: "Dashboard Modules"
    files:

      # ---------------------------------------------------------------
      # Global settings: greeting + the single calendar feed that
      # powers the Month Calendar, This Week in a Nutshell, and the
      # Daily Agenda simultaneously.
      # ---------------------------------------------------------------
      - name: "settings"
        label: "Dashboard Settings"
        file: "content/data/settings.json"
        fields:
          - { label: "Owner Name", name: "owner_name", widget: "string", default: "Doctoral Candidate" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "PhD Academic Dashboard", required: false }
          - label: "Calendar Feed URL"
            name: "calendar_feed"
            widget: "string"
            required: false
            hint: >-
              One public calendar link powers all three widgets (month grid,
              7-day summary, daily agenda). Best option: the calendar's public
              ICS address — in Google Calendar open Settings for the calendar,
              make it public, and copy "Public address in iCal format"
              (ends in .ics). A Google embed URL also works: the dashboard
              extracts the feed from it automatically. Notion calendars: use
              their published ICS link.

      # ---------------------------------------------------------------
      # Tools: quick launchers (Notion, Zotero, Research Rabbit,
      # Gemini) AND published Claude artifacts, unified in one list
      # shown in the left navigation pane.
      # ---------------------------------------------------------------
      - name: "tools"
        label: "Tools"
        file: "content/data/tools.json"
        fields:
          - label: "Tools"
            name: "tools"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string", hint: "External app or your published claude.site artifact link" }
              - { label: "Note", name: "note", widget: "string", required: false, hint: "Optional small caption, e.g. 'Claude artifact' or 'References'" }

      # ---------------------------------------------------------------
      # Supervisor Sentinel: advisor deliverable, status, milestones,
      # last discussion log, voice memo, and the Days Active start date
      # ---------------------------------------------------------------
      - name: "supervisor"
        label: "Supervisor Sentinel"
        file: "content/data/supervisor.json"
        fields:
          - { label: "Current Advisor Deliverable", name: "deliverable", widget: "string" }
          - label: "Status"
            name: "status"
            widget: "select"
            options: ["Not Started", "In Progress", "Sent for Review", "Ready for Meeting"]
            default: "Not Started"
          - label: "Cycle Start Date"
            name: "cycle_start"
            widget: "datetime"
            hint: "The Days Active ticker counts from this date. Reset it when a new deliverable cycle begins."
          - label: "Micro-Milestones"
            name: "milestones"
            widget: "list"
            summary: "{{fields.task}}"
            fields:
              - { label: "Task", name: "task", widget: "string" }
              - { label: "Done", name: "done", widget: "boolean", default: false }
          - label: "Last Discussion Log"
            name: "last_discussion"
            widget: "text"
            required: false
            hint: >-
              Summary of terms from the previous advising session. Markdown
              works: **bold** for key phrases, - for bullet lists, blank
              lines for paragraphs.
          - label: "Voice Memo"
            name: "voice_note"
            widget: "file"
            required: false
            hint: >-
              Attach a recorded meeting recap. Record it right on the Advisor
              page with the microphone button, download the file, and upload
              it here — it plays back above the discussion log.

      # ---------------------------------------------------------------
      # Milestone Roadmap: the academic progress highway. Each node can
      # carry a target date, a note, and its own sub-task checklist,
      # all shown in the slide-down detail pane.
      # ---------------------------------------------------------------
      - name: "roadmap"
        label: "Milestone Roadmap"
        file: "content/data/roadmap.json"
        fields:
          - label: "Institutional Milestones"
            name: "milestones"
            widget: "list"
            summary: "{{fields.title}} — {{fields.state}}"
            fields:
              - { label: "Milestone", name: "title", widget: "string" }
              - label: "State"
                name: "state"
                widget: "select"
                options: ["Future", "Active Focus", "Completed"]
                default: "Future"
              - { label: "Target / Execution Date", name: "date", widget: "string", required: false, hint: "e.g. Spring 2027 or Oct 15, 2026" }
              - { label: "Note", name: "note", widget: "string", required: false }
              - label: "Sub-Tasks"
                name: "subtasks"
                widget: "list"
                required: false
                summary: "{{fields.task}}"
                fields:
                  - { label: "Task", name: "task", widget: "string" }
                  - { label: "When", name: "when", widget: "string", required: false, hint: "Optional date or window, e.g. 'by Aug 1'" }
                  - { label: "Done", name: "done", widget: "boolean", default: false }

      # ---------------------------------------------------------------
      # Class Repository: the course drive. Every material is filed
      # into one of three folders shown in the course workspace drawer.
      # ---------------------------------------------------------------
      - name: "courses"
        label: "Class Repository"
        file: "content/data/courses.json"
        fields:
          - label: "Courses"
            name: "courses"
            widget: "list"
            summary: "{{fields.code}} · {{fields.title}}"
            fields:
              - { label: "Course Code", name: "code", widget: "string", hint: "e.g. EDU 801" }
              - { label: "Course Title", name: "title", widget: "string" }
              - { label: "Term", name: "term", widget: "string", required: false }
              - label: "Materials"
                name: "materials"
                widget: "list"
                required: false
                summary: "{{fields.folder}} — {{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - label: "Folder"
                    name: "folder"
                    widget: "select"
                    options: ["Lectures & Slides", "Assignments & Coding", "Core Readings"]
                    default: "Lectures & Slides"
                  - label: "Kind"
                    name: "kind"
                    widget: "select"
                    options: ["Notes", "PDF", "Slides", "Project", "Code", "Paper"]
                    default: "Notes"
                  - label: "Upload File"
                    name: "file"
                    widget: "file"
                    required: false
                    hint: "PDFs, slides, and docs save to /assets/ automatically."
                  - { label: "External Link", name: "link", widget: "string", required: false, hint: "Used if no file is uploaded." }

      # ---------------------------------------------------------------
      # Target Journal Directory: deep aim profiles opened from the
      # journal library rows.
      # ---------------------------------------------------------------
      - name: "journals"
        label: "Target Journal Directory"
        file: "content/data/journals.json"
        fields:
          - label: "Journals"
            name: "journals"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Journal Name", name: "name", widget: "string" }
              - { label: "Focus", name: "focus", widget: "text", required: false, hint: "One-line focus shown in the library row." }
              - label: "Technical Aims & Scope"
                name: "aims"
                widget: "text"
                required: false
                hint: "Longer aims description shown in the profile drawer. Markdown supported."
              - { label: "Accepted Word Limit", name: "word_limit", widget: "string", required: false, hint: "e.g. 9,000 words incl. references" }
              - { label: "Review Frequency", name: "review_time", widget: "string", required: false, hint: "e.g. First decision in ~90 days" }
              - { label: "Submission Guidelines Link", name: "guidelines", widget: "string", required: false }
              - label: "Guidelines Packet (PDF)"
                name: "pdf_packet"
                widget: "file"
                required: false
                hint: "Upload the journal's PDF guidelines packet for instant review from the profile drawer."

      # ---------------------------------------------------------------
      # Literature Queue & Reading Log: the reading vault. Dragging a
      # card between columns on the dashboard flips this Status field.
      # ---------------------------------------------------------------
      - name: "literature"
        label: "Literature Queue & Reading Log"
        file: "content/data/literature.json"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.title}} ({{fields.status}})"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Author(s)", name: "author", widget: "string", required: false, hint: "e.g. Braun & Clarke" }
              - { label: "Year", name: "year", widget: "number", value_type: "int", required: false }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["To-Read", "Read"]
                default: "To-Read"
                hint: "To-Read shows in the Queue (Inbox); Read moves it to the Archive (Vault). Dragging the card on the dashboard also flips this."
              - label: "Keyword Tags"
                name: "tags"
                widget: "list"
                required: false
                field: { label: "Tag", name: "tag", widget: "string" }
                hint: "Tags are searchable from the live filter bar."
              - { label: "Summary", name: "summary", widget: "text", required: false, hint: "Short abstract shown on the card." }
              - label: "Running Notes"
                name: "notes"
                widget: "markdown"
                required: false
                hint: "Your workspace for running notes, summaries, and citations — rendered in the reading drawer."
              - label: "Full-Text PDF"
                name: "pdf"
                widget: "file"
                required: false
                hint: "Saves to /assets/; opens from the card's workspace drawer."
              - label: "Attached Graphics"
                name: "media"
                widget: "list"
                required: false
                summary: "Graphic"
                field: { label: "Image", name: "image", widget: "image" }
                hint: "Regression tables, data charts, or layout snips — displayed in the workspace drawer."

      # ---------------------------------------------------------------
      # Advancement Pipelines: every entry carries its own operational
      # dates, execution checklist, and reference draft file, shown in
      # the entry's execution profile drawer.
      # ---------------------------------------------------------------
      - name: "pipelines"
        label: "Advancement Pipelines"
        file: "content/data/pipelines.json"
        fields:
          - label: "Journal Submissions"
            name: "submissions"
            widget: "list"
            required: false
            summary: "{{fields.title}} — {{fields.status}}"
            fields:
              - { label: "Manuscript Title", name: "title", widget: "string" }
              - { label: "Journal", name: "journal", widget: "string", required: false }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Drafting", "Submitted", "Under Review", "Revise & Resubmit", "Accepted", "Rejected"]
                default: "Drafting"
              - label: "Operational Dates"
                name: "dates"
                widget: "list"
                required: false
                summary: "{{fields.label}}: {{fields.when}}"
                fields:
                  - { label: "Label", name: "label", widget: "string", hint: "e.g. Submitted on / Decision expected" }
                  - { label: "When", name: "when", widget: "string" }
              - label: "Execution Checklist"
                name: "subtasks"
                widget: "list"
                required: false
                summary: "{{fields.task}}"
                fields:
                  - { label: "Task", name: "task", widget: "string" }
                  - { label: "Done", name: "done", widget: "boolean", default: false }
              - label: "Reference Draft"
                name: "ref"
                widget: "file"
                required: false
                hint: "The manuscript draft file this submission refers to."
          - label: "Conferences"
            name: "conferences"
            widget: "list"
            required: false
            summary: "{{fields.name}} — {{fields.attendance}}"
            fields:
              - { label: "Conference", name: "name", widget: "string" }
              - { label: "Event Date", name: "date", widget: "string", required: false, hint: "e.g. Apr 2027" }
              - label: "Attendance"
                name: "attendance"
                widget: "select"
                options: ["Presenting", "Spectator"]
                default: "Spectator"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Planned", "Abstract Submitted", "Accepted", "Attended", "Declined"]
                default: "Planned"
              - label: "Operational Dates"
                name: "dates"
                widget: "list"
                required: false
                summary: "{{fields.label}}: {{fields.when}}"
                fields:
                  - { label: "Label", name: "label", widget: "string", hint: "e.g. Submission closes / Notification / Early-bird ends" }
                  - { label: "When", name: "when", widget: "string" }
              - label: "Execution Checklist"
                name: "subtasks"
                widget: "list"
                required: false
                summary: "{{fields.task}}"
                fields:
                  - { label: "Task", name: "task", widget: "string", hint: "e.g. Register / Finalize slides / Submit paper layout" }
                  - { label: "Done", name: "done", widget: "boolean", default: false }
              - label: "Reference Draft"
                name: "ref"
                widget: "file"
                required: false
                hint: "The slide deck or paper being presented."
          - label: "Grants"
            name: "grants"
            widget: "list"
            required: false
            summary: "{{fields.name}} — {{fields.status}}"
            fields:
              - { label: "Grant", name: "name", widget: "string" }
              - { label: "Sponsor", name: "sponsor", widget: "string", required: false }
              - { label: "Deadline", name: "deadline", widget: "string", required: false, hint: "e.g. Oct 2026" }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Scouting", "Drafting", "Submitted", "Awarded", "Declined"]
                default: "Scouting"
              - label: "Operational Dates"
                name: "dates"
                widget: "list"
                required: false
                summary: "{{fields.label}}: {{fields.when}}"
                fields:
                  - { label: "Label", name: "label", widget: "string", hint: "e.g. LOI due / Full proposal due / Award notification" }
                  - { label: "When", name: "when", widget: "string" }
              - label: "Execution Checklist"
                name: "subtasks"
                widget: "list"
                required: false
                summary: "{{fields.task}}"
                fields:
                  - { label: "Task", name: "task", widget: "string" }
                  - { label: "Done", name: "done", widget: "boolean", default: false }
              - label: "Reference Draft"
                name: "ref"
                widget: "file"
                required: false
                hint: "The proposal draft this application refers to."
          - label: "Programs & Misc Opportunities"
            name: "programs"
            widget: "list"
            required: false
            summary: "{{fields.name}} — {{fields.status}}"
            fields:
              - { label: "Opportunity", name: "name", widget: "string" }
              - { label: "Organization", name: "org", widget: "string", required: false }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Watching", "Applied", "Accepted", "Completed", "Declined"]
                default: "Watching"
              - { label: "Note", name: "note", widget: "string", required: false }
              - label: "Operational Dates"
                name: "dates"
                widget: "list"
                required: false
                summary: "{{fields.label}}: {{fields.when}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "When", name: "when", widget: "string" }
              - label: "Execution Checklist"
                name: "subtasks"
                widget: "list"
                required: false
                summary: "{{fields.task}}"
                fields:
                  - { label: "Task", name: "task", widget: "string" }
                  - { label: "Done", name: "done", widget: "boolean", default: false }
              - label: "Reference File"
                name: "ref"
                widget: "file"
                required: false

      # ---------------------------------------------------------------
      # Writing Progress Matrix
      # ---------------------------------------------------------------
      - name: "writing"
        label: "Writing Progress Matrix"
        file: "content/data/writing.json"
        fields:
          - label: "Current Major Project"
            name: "project"
            widget: "string"
            hint: "Qualifying Paper while pre-candidate; switch to your Dissertation upon candidacy."
          - { label: "Phase Note", name: "phase", widget: "string", required: false, hint: "Shown under the project title, e.g. Pre-Candidacy." }
          - label: "Sections / Chapters"
            name: "sections"
            widget: "list"
            summary: "{{fields.name}} — {{fields.progress}}%"
            fields:
              - { label: "Section or Chapter", name: "name", widget: "string" }
              - { label: "Progress (0–100)", name: "progress", widget: "number", value_type: "int", min: 0, max: 100, default: 0 }
